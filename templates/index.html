<!DOCTYPE html>
<html>
<head>
    <title>AI Image Caption Generator</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            width: 450px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #333;
        }

        input {
            margin: 20px;
        }

        button {
            background-color: #0078D4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005ea2;
        }

        .caption {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>AI Image Caption Generator</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <br>

        <button type="submit">
            Generate Caption
        </button>

    </form>

    <div class="caption">
        {{ caption }}
    </div>

</div>

</body>
</html>
